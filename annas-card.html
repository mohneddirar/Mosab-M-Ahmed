<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Annas Ibrahim Eid — COO, WOQOD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      background:#000e26;
      font-family:'Inter',sans-serif;
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      padding:40px 20px;
    }

    .page{ width:100%; max-width:420px; }

    /* ── HERO PHOTO ── */
    .hero{
      position:relative;
      border-radius:20px 20px 0 0;
      overflow:hidden;
      height:420px;
    }
    .hero img{
      width:100%; height:100%;
      object-fit:cover; object-position:center 10%;
      display:block;
    }
    /* dark gradient bottom */
    .hero::after{
      content:'';
      position:absolute; inset:0;
      background:linear-gradient(
        to bottom,
        rgba(0,14,38,0) 30%,
        rgba(0,14,38,0.5) 60%,
        rgba(0,14,38,0.95) 100%
      );
    }
    /* WOQOD logo top-left */
    .hero-logo{
      position:absolute; top:22px; left:22px; z-index:2;
      display:flex; align-items:center; gap:10px;
      background:rgba(0,20,60,0.75);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:10px;
      padding:8px 14px;
      backdrop-filter:blur(8px);
    }
    .hero-logo img{
      width:32px; height:32px;
      object-fit:contain; object-position:center;
      mix-blend-mode:screen; filter:brightness(1.2);
    }
    .hero-logo-text{
      display:flex; flex-direction:column; line-height:1;
    }
    .hero-logo-text span:first-child{
      font-size:11px; font-weight:700; letter-spacing:0.18em;
      color:#fff; text-transform:uppercase;
    }
    .hero-logo-text span:last-child{
      font-size:10px; color:rgba(255,255,255,0.4);
      margin-top:2px; direction:rtl;
    }
    /* name overlay at bottom of photo */
    .hero-name{
      position:absolute; bottom:0; left:0; right:0; z-index:2;
      padding:24px 28px;
    }
    .hero-prefix{
      font-size:11px; font-weight:500; color:#3aaa35;
      letter-spacing:0.12em; margin-bottom:4px;
    }
    .hero-fullname{
      font-family:'Playfair Display',serif;
      font-size:32px; font-weight:700;
      color:#ffffff; line-height:1.05;
      letter-spacing:0.01em; margin-bottom:10px;
    }
    .hero-pill{
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(58,170,53,0.18);
      border:1px solid rgba(58,170,53,0.35);
      border-radius:999px; padding:5px 13px;
    }
    .hero-pill-dot{
      width:5px; height:5px; border-radius:50%;
      background:#3aaa35; box-shadow:0 0 6px #3aaa35;
    }
    .hero-pill span{
      font-size:10px; font-weight:600;
      letter-spacing:0.14em; text-transform:uppercase;
      color:#6ecc69;
    }

    /* ── INFO CARD ── */
    .info-card{
      background:#001440;
      border-left:1px solid rgba(255,255,255,0.07);
      border-right:1px solid rgba(255,255,255,0.07);
      padding:0 28px;
    }

    /* company row */
    .company-row{
      display:flex; align-items:center; gap:12px;
      padding:20px 0;
      border-bottom:1px solid rgba(255,255,255,0.07);
    }
    .company-logo{
      width:40px; height:40px;
      object-fit:contain;
      mix-blend-mode:screen; filter:brightness(1.1);
      flex-shrink:0;
    }
    .company-details{}
    .company-name-en{
      font-size:13px; font-weight:600; color:#c8d8f0; letter-spacing:0.04em;
    }
    .company-name-sub{
      font-size:11px; color:#4a6090; margin-top:1px;
    }

    /* contact items */
    .contact-list{
      display:flex; flex-direction:column;
      padding:4px 0;
    }
    .ci{
      display:flex; align-items:center; gap:14px;
      padding:14px 0;
      border-bottom:1px solid rgba(255,255,255,0.05);
      text-decoration:none; color:inherit;
      transition:opacity 0.2s;
    }
    .ci:last-child{ border-bottom:none; }
    .ci:hover{ opacity:0.72; }
    .ci-icon-wrap{
      width:36px; height:36px; flex-shrink:0;
      border-radius:8px;
      background:rgba(58,170,53,0.1);
      border:1px solid rgba(58,170,53,0.2);
      display:flex; align-items:center; justify-content:center;
    }
    .ci-icon-wrap svg{ width:15px; height:15px; fill:#3aaa35; }
    .ci-text{ display:flex; flex-direction:column; }
    .ci-label{
      font-size:9px; font-weight:600; letter-spacing:0.14em;
      text-transform:uppercase; color:#3a5080; margin-bottom:2px;
    }
    .ci-value{
      font-size:13px; font-weight:400; color:#90a8d0;
    }

    /* ── FOOTER ── */
    .footer{
      background:#001230;
      border-radius:0 0 20px 20px;
      border:1px solid rgba(255,255,255,0.06);
      border-top:1px solid rgba(58,170,53,0.15);
      padding:14px 28px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .footer-left{
      font-size:9px; font-weight:600;
      letter-spacing:0.16em; text-transform:uppercase;
      color:rgba(255,255,255,0.18);
    }
    .footer-right{
      display:flex; align-items:center; gap:6px;
    }
    .footer-flag{ font-size:16px; opacity:0.65; }
    .footer-country{
      font-size:9px; font-weight:500; letter-spacing:0.1em;
      color:rgba(255,255,255,0.2);
    }

    @media(max-width:460px){
      .hero{ height:360px; }
      .hero-fullname{ font-size:26px; }
      .info-card{ padding:0 20px; }
      .footer{ padding:12px 20px; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- HERO: full photo with overlays -->
  <div class="hero">
    <img src="COO.jpg" alt="Mr. Annas Ibrahim Eid"/>

    <!-- WOQOD logo badge top-left -->
    <div class="hero-logo">
      <img src="Qatar_Fuel_logo_svg__1_.png" alt="WOQOD"/>
      <div class="hero-logo-text">
        <span>WOQOD</span>
        <span>وقود</span>
      </div>
    </div>

    <!-- Name + title over photo -->
    <div class="hero-name">
      <div class="hero-prefix">Mr.</div>
      <div class="hero-fullname">Annas Ibrahim Eid</div>
      <div class="hero-pill">
        <div class="hero-pill-dot"></div>
        <span>Chief Operations Officer</span>
      </div>
    </div>
  </div>

  <!-- INFO -->
  <div class="info-card">

    <!-- Company row -->
    <div class="company-row">
      <img class="company-logo" src="Qatar_Fuel_logo_svg__1_.png" alt="WOQOD"/>
      <div class="company-details">
        <div class="company-name-en">Qatar Fuel Company — WOQOD</div>
        <div class="company-name-sub">Oil &amp; Gas · Doha, State of Qatar</div>
      </div>
    </div>

    <!-- Contact list -->
    <div class="contact-list">

      <a class="ci" href="tel:+97444558000">
        <div class="ci-icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
        </div>
        <div class="ci-text">
          <span class="ci-label">Office</span>
          <span class="ci-value">+974 4455 8000</span>
        </div>
      </a>

      <a class="ci" href="mailto:annas.eid@woqod.com.qa">
        <div class="ci-icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </div>
        <div class="ci-text">
          <span class="ci-label">Email</span>
          <span class="ci-value">annas.eid@woqod.com.qa</span>
        </div>
      </a>

      <a class="ci" href="https://www.woqod.com.qa" target="_blank" rel="noopener">
        <div class="ci-icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        </div>
        <div class="ci-text">
          <span class="ci-label">Website</span>
          <span class="ci-value">www.woqod.com.qa</span>
        </div>
      </a>

    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span class="footer-left">Qatar Fuel Company · WOQOD</span>
    <div class="footer-right">
      <span class="footer-flag">🇶🇦</span>
      <span class="footer-country">Doha, Qatar</span>
    </div>
  </div>

</div>
</body>
</html>
